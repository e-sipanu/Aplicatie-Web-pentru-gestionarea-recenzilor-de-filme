<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Eroare</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background: #101827;
			color: #f9fafb;
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
		}

		.error-card {
			background: #111827;
			border-radius: 12px;
			padding: 32px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
			max-width: 500px;
			text-align: center;
		}

		h1 {
			font-size: 2rem;
			margin-bottom: 0.5rem;
			color: #f97316;
		}

		.status {
			font-size: 1.2rem;
			color: #9ca3af;
			margin-bottom: 1rem;
		}

		.message {
			font-size: 1rem;
			color: #e5e7eb;
			margin-bottom: 2rem;
		}

		a {
			display: inline-block;
			padding: 10px 20px;
			background: #3b82f6;
			color: white;
			text-decoration: none;
			border-radius: 8px;
			font-weight: 600;
		}

		a:hover {
			background: #2563eb;
		}
	</style>
</head>

<body>

	<div class="error-card">
		<h1>Eroare</h1>
		<div class="status">Status: <span th:text="${status}">-</span></div>
		<div class="message" th:text="${message}">A apărut o eroare neașteptată.</div>
		<a href="/login">Înapoi la Login</a>
	</div>

</body>

</html>
