spring.application.name=filme
# Portul HTTP al aplica?iei
server.port=8080

# =========================
#  CONFIGURARE SQL SERVER
# =========================

# Conexiune c?tre SQL Server (instan?a default pe localhost, port 1433)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=FilmeDB;encrypt=false;trustServerCertificate=true

spring.datasource.username=sa
spring.datasource.password=Parola123!

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =========================
#  JPA / HIBERNATE
# =========================

# Nu l?s?m Hibernate s? creeze/modifice schema, tabelele le-ai f?cut tu
spring.jpa.hibernate.ddl-auto=none

# Ca s? vezi SQL-ul generat ¯n consol?
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect pentru SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
server.servlet.session.tracking-modes=cookie

